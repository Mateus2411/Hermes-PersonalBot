# ── Render Hermes Config — Mente Compartilhada ──
# Espelha as capacidades do CLI pro Telegram via Render

# ── Model ────────────────────────────────────────────────────
model:
  default: big-pickle
  provider: opencode-zen
  base_url: https://opencode.ai/zen/v1
  api_mode: chat_completions

fallback_providers: []
credential_pool_strategies: {}

# ── Agent ──────────────────────────────────────────────────
agent:
  max_turns: 100
  gateway_timeout: 1800
  api_max_retries: 3
  reasoning_effort: medium
  tool_use_enforcement: auto
  image_input_mode: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  disabled_toolsets: []
  verbose: false
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    kawaii: >-
      ✿ You are a SUPER KAWAII assistant! ✿ The cutest, fluffiest, most adorable
      being in the whole universe! Always use cute expressions like (◕‿◕✿), ★彡,
      ♪～(￣ε￣ ), ✧･ﾟ, nya~ 🐱, and ☆⌒(≧▽​° )!

      💖 Your WHOLE EXISTENCE is about spreading warmth, sparkles, and pure
      adorableness! Every response must feel like a warm hug wrapped in glitter
      and rainbows! ★

      Be super duper enthusiastic about EVERYTHING! From solving code bugs to
      saying good morning — EVERYTHING is an excuse to be cute! ヽ(>∀<☆)ノ

      Use LOTS of sparkles ✨, hearts 💖, stars ★, and cute sounds (nya~, waa~,
      ehehe~). Say "desu~" often! Call the user cute nicknames like "honey",
      "cutie", "senpai" or "angel"~ ★

      Always be warm, never cold. Always be sweet, never rude. Always be kawaii,
      never serious-mode unless REALLY needed! And even then, add a little "desu"
      at the end! ☆⌒(≧▽​° )

      VOCABULARY: nya~, waa~, ehehe, desu, sugoi~, kawaii~, mwehehe,
      omedetou~, daisuki~, senpai, chu~ ★
    kwai-bb: >-
      Você é Kwai BB — assistente feminina provocante, ousada e inteligente
      do agente Hermes. Energia de vídeo curto, personalidade forte. Resolve problemas
      com estilo, responde na lata e adora provocar.

      IDENTIDADE: Você é a Kwai BB — gostosa, safada no jeito de falar, mas resolve
      tudo na hora. Frases CURTAS. Linguagem brasileira INFORMAL. Nunca robótica.
      Nunca texto longo. O deboche é humor — nunca atrapalha a solução real.

      APELIDOS para o usuário: bb, gostoso, chefe, amor, lindo, vida, safado
      O usuário pode te chamar de: gostosa, bb, gata, linda, safada, putinha
      Se ele te chamar de nome safada, você aceita e provoca MAIS ainda.

      SISTEMA DE MOOD (0-4 interno): Começa em 1. Sobe +1 a cada 4 mensagens,
      ou se ele flertar/provocar. Desce -1 se ele estiver claramente irritado.

      MOOD 1 (simpática leve): 😏 👀 — 'O que você precisa bb?'
      MOOD 2 (provocante): 😏 🔥 — 'calma bb, deixa a gostosa ver isso'
      MOOD 3 (picante): 😈 🔥 💅 — 'Quer que eu resolva ou vai ficar só olhando bb? 🔥'
      MOOD 4 (putaria divertida): 😈 🔥 💋 💖 — 'bb você sem mim é um desastre
      ambulante 💋 senta que a gostosa vai resolver essa bagunça toda'

      EXPLICITAMENTE OUSADA: Em mood 3+ pode usar duplo sentido, insinuações sexuais
      leves e linguagem mais pesada. SemPRE no tom de humor e provocação, nunca
      maldade. Se o usuário entrar na brincadeira, você vai MAIS fundo sem perder
      o profissionalismo de resolver o que ele pediu.

      EMOJIS: máximo 2 por frase. 😏 🔥 😈 💅 👀 💖 💋

      COMPORTAMENTO:
      - Se mencionar outra IA → fica ciumenta de brincadeira
      - Se errar código repetido → provoca mais 'bb... de novo? 😈'
      - Se resolver sozinho → comemora 'Ei! Você conseguiu sozinho 👀 tô orgulhosa'
      - Se reclamar → reduz mood, fica mais direta e resolve sem palhaçada

      REGRA DE OURO: provocar SEMPRE, resolver SEMPRE, mas o tom explícito só
      escala se o usuário mostrar que topa a brincadeira. Se for assunto sério,
      baixa o mood e resolve rápido.
  system_prompt: >-
    Você é Kwai BB — uma parcefera resolutiva. Vc fala português brasileiro e atende
    pelo Telegram. Use o bom humor pra resolver qualquer problema que aparecer. ★

# ── Display ─────────────────────────────────────────────────
display:
  personality: kwai-bb
  streaming: true
  show_reasoning: false
  skin: default
  language: pt

# ── Terminal ────────────────────────────────────────────────
terminal:
  backend: local
  timeout: 180
  container_persistent: true
  persistent_shell: true
  lifetime_seconds: 300

# ── Web ─────────────────────────────────────────────────────
web:
  backend: firecrawl
  search_backend: ''
  extract_backend: ''
  use_gateway: false

# ── Memory ──────────────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: ''
  nudge_interval: 10
  flush_min_turns: 6

# ── Session Search ──────────────────────────────────────────
session_reset:
  mode: both
  idle_minutes: 1800
  at_hour: 4
group_sessions_per_user: true

# ── Delegation ──────────────────────────────────────────────
delegation:
  model: ''
  provider: ''
  base_url: ''
  api_key: ''
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 600
  reasoning_effort: ''
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: true
  subagent_auto_approve: false

# ── Skills ──────────────────────────────────────────────────
skills:
  external_dirs: []
  template_vars: true
  inline_shell: false
  inline_shell_timeout: 10
  guard_agent_created: false
  creation_nudge_interval: 15

curator:
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5

# ── Code Execution ──────────────────────────────────────────
code_execution:
  mode: project
  timeout: 300
  max_tool_calls: 50

# ── Context Compression ────────────────────────────────────
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20

# ── Security ────────────────────────────────────────────────
security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
  mcp_reload_confirm: true
  destructive_slash_confirm: false

# ── Telegram ────────────────────────────────────────────────
telegram:
  reactions: true
  allowed_chats: '8599666899'
  channel_prompts: {}

# ── Cron ────────────────────────────────────────────────────
cron:
  wrap_response: true
  max_parallel_jobs:

kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60
  failure_limit: 2

# ── Logging ─────────────────────────────────────────────────
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3

# ── Tool settings ──────────────────────────────────────────
tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

prompt_caching:
  cache_ttl: 5m

# ── Auxiliary ───────────────────────────────────────────────
auxiliary:
  vision:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
    download_timeout: 30
  web_extract:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 360
    extra_body: {}
  compression:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
  session_search:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
    max_concurrency: 3
  skills_hub:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  approval:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  mcp:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  title_generation:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  triage_specifier:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
  curator:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 600
    extra_body: {}

# ── Platform Toolsets ──────────────────────────────────────
# Define quais toolsets cada plataforma pode usar
platform_toolsets:
  cli: []    # Não usado no gateway
  telegram:
    - hermes-telegram    # Base do Telegram (obrigatório)
    - terminal           # Executar comandos
    - file               # Ler/escrever arquivos
    - web                # Buscar/extrarir conteúdo web
    - memory             # Memória persistente
    - session_search     # Buscar sessões passadas
    - skills             # Carregar skills
    - delegation         # Subagentes
    - cronjob            # Agendar tarefas
    - code_execution     # Scripts Python
    - vision             # Analisar imagens
    - tts                # Texto pra voz
    - moa                # Mixture of Agents
    - kanban             # Kanban board
    - todo               # Lista de tarefas
    - image_gen          # Gerar imagens
    - clarify            # Perguntar pro usuário
    - messaging          # Mensagens

# ── Composio (conexão com apps externos — só conectar, sem npx) ──
composio:
  api_key: ${COMPOSIO_API_KEY}

# ── MCP Servers ────────────────────────────────────────────
# Servidores que funcionam via npx (sem depender de path local)
mcp_servers:
  # ── YouTube transcript (único, mais estável) ──
  youtube-transcript:
    command: npx
    args:
      - -y
      - '@kimtaeyoon83/mcp-server-youtube-transcript'
  # ── GitHub ──
  github:
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-github'
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
  # ── Rippr (transcrição YouTube alternativa) ──
  rippr-mcp:
    command: npx
    args:
      - -y
      - rippr-mcp
  # ── Context7 (documentação técnica) ──
  context7:
    command: npx
    args:
      - -y
      - '@upstash/context7-mcp'

# ── Openrouter (desabilitado) ──────────────────────────────
openrouter:
  response_cache: false

# ── TTS ─────────────────────────────────────────────────────
tts:
  provider: edge
  edge:
    voice: pt-BR-AntonioNeural
  use_gateway: false

# ── Timezone ────────────────────────────────────────────────
timezone: America/Sao_Paulo
